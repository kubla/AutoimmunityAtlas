<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monogenic Autoimmunity Atlas</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js" defer></script>
    <script type="module" src="assets/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <h1>Monogenic Autoimmunity Atlas</h1>
      <p class="subtitle">Mechanism-first map of monogenic immune dysregulation</p>
    </header>

    <main class="layout">
      <aside id="controls" aria-label="Legend and filters"></aside>
      <section id="map" aria-label="Mechanism map">
        <svg id="atlas-svg" role="img" aria-label="Clustered mechanism map"></svg>
      </section>
      <aside id="inspector" aria-live="polite" aria-label="Disorder details"></aside>
    </main>

    <footer class="site-footer">
      <p>This atlas is educational and mechanism-focused, not diagnostic guidance.</p>
    </footer>
  </body>
</html>
